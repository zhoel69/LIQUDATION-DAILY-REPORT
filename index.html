<!DOCTYPE html>
<html lang="id">

<title>PHASE BALANCE SYSTEM</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;

  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;
}

body{
  background:#0F1115;
  padding:14px;
  color:#D8FFD8;
  touch-action:manipulation;
}

.container{
  max-width:540px;
  margin:auto;
}

.card{
  background:#171A21;
  border-radius:24px;
  padding:18px;
  border:1px solid #222831;

  box-shadow:
  0 0 20px rgba(0,255,120,0.08),
  0 0 40px rgba(255,0,80,0.05);
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  color:#00FF88;
  letter-spacing:1px;
}

.sub{
  text-align:center;
  margin-top:6px;
  margin-bottom:22px;
  color:#8B949E;
  font-size:11px;
  letter-spacing:2px;
}

.form-title{
  margin-bottom:14px;
  font-size:13px;
  font-weight:bold;
  color:#00FF88;
  letter-spacing:1px;
}

.form-group{
  margin-bottom:14px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:11px;
  font-weight:bold;
  color:#9CFFA7;
  letter-spacing:1px;
}

.input{
  width:100%;
  height:50px;
  border:none;
  border-radius:15px;
  background:#11151C;
  padding:0 14px;
  font-size:13px;
  color:#E8FFE8;
  border:1px solid #2A313C;
  text-transform:uppercase;
}

.input:focus{
  outline:none;
  border:2px solid #00FF88;
  background:#0F1319;
}

select.input{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

.btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #00FF88,
  #00CC6A
  );

  color:#000;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;

  transition:0.2s;
}

.btn:active{
  transform:scale(0.98);
}

.reset-btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #FF5C5C,
  #D93636
  );

  color:#FFF;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;

  transition:0.2s;
}

.reset-btn:active{
  transform:scale(0.98);
}

.wa-btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #25D366,
  #128C7E
  );

  color:#FFF;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;

  transition:0.2s;
}

.wa-btn:active{
  transform:scale(0.98);
}

.staging-btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #5C8DFF,
  #3461FF
  );

  color:#FFF;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;

  transition:0.2s;
}

.staging-btn:active{
  transform:scale(0.98);
}

.list-box{
  margin-top:18px;
  background:#11151C;
  border-radius:16px;
  padding:16px;
  border:1px solid #2A313C;
}

.list-title{
  color:#00FF88;
  font-size:14px;
  font-weight:900;
  margin-bottom:12px;
  letter-spacing:1px;
}

.item{
  padding:14px;
  border-radius:14px;
  background:#171A21;
  margin-bottom:12px;
  border:1px solid #2A313C;

  white-space:pre-line;

  line-height:1.6;
  font-size:13px;

  color:#E8FFE8;
}

.balance{
  color:#00FF88;
  font-weight:bold;
}

.minus{
  color:#FF5C5C;
  font-weight:bold;
}

.plus{
  color:#FFD65C;
  font-weight:bold;
}

.total-number{
  color:#00FF88;
  font-weight:bold;
}

.phase-summary{
  padding:14px;
  border-radius:14px;
  background:#171A21;
  margin-bottom:12px;
  border:1px solid #2A313C;
  line-height:1.8;
  font-size:13px;
}

.preview-wrap{
  display:flex;
  gap:10px;
  overflow:auto;
  margin-top:10px;
  padding-bottom:4px;
}

.preview-wrap img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:14px;
  border:1px solid #2A313C;
  flex-shrink:0;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:#7E8793;
  font-size:11px;
  letter-spacing:1px;
  line-height:1.7;
}

::-webkit-scrollbar{
  height:5px;
  width:5px;
}

::-webkit-scrollbar-thumb{
  background:#2A313C;
  border-radius:20px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- BUTTON -->
    <button class="btn"
            onclick="tambahData()">

      TAMBAH DATA

    <!-- RESET -->
    <button class="reset-btn"
            onclick="resetData()">

      RESET SEMUA DATA

    <!-- WA DAILY -->
    <button class="wa-btn"
            onclick="kirimDailyReport()">

      KIRIM DAILY REPORT

    </button>

    <!-- WA STAGING -->
    <button class="staging-btn"
            onclick="kirimStagingReport()">

      KIRIM STAGING

    </button>

    <!-- LIST -->
    <div class="list-box">

      <div class="list-title">
        LIST HASIL PHASE
      </div>

      <div id="listData"></div>

    </div>

    <!-- GRAND -->
    <div class="list-box">

      <div class="list-title">
        GRAND TOTAL
      </div>

      <div id="grandTotal"
           class="phase-summary"></div>

    </div>

    <!-- DAILY REPORT -->
    <div class="list-box">

      <div class="list-title">
        DAILY REPORT
      </div>

      <div id="hasilReport"
           class="phase-summary"></div>

    </div>

    <!-- STAGING -->
    <div class="list-box">

      <div class="list-title">
        JOB DESC STAGING
      </div>

      <div id="hasilStaging"
           class="phase-summary"></div>

    </div>

    <!-- FOOTER -->
<div class="footer">

  PHASE BALANCE SYSTEM<br>
  DAILY LIQUIDATION & STAGING MONITORING<br><br>

  ©2026 ZULFAHMI AFNULA<br>
  ALL RIGHTS RESERVED

</div>

  </div>

</div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL =
'https://wepqievfgfqsoilynrhc.supabase.co';

const SUPABASE_KEY =
'sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1';

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* ================= BLOK COPY PASTE ================= */

document.addEventListener(
'copy',
e => e.preventDefault()
);

document.addEventListener(
'cut',
e => e.preventDefault()
);

document.addEventListener(
'paste',
e => e.preventDefault()
);

document.addEventListener(
'contextmenu',
e => e.preventDefault()
);

/* ================= DATA ================= */

let semuaData = [];
let fotoLaporanList = [];

/* ================= REALTIME ================= */

const semuaInput =
document.querySelectorAll(
'input,select'
);

semuaInput.forEach(el => {

  el.addEventListener('input',()=>{

    if(
      el.type !== 'number' &&
      el.type !== 'file' &&
      el.type !== 'datetime-local'
    ){

      el.value =
      el.value.toUpperCase();

    }

  });

});

/* ================= FORMAT TANGGAL ================= */

function formatTanggalJam(value){

  if(!value) return '-';

  const date =
  new Date(value);

  const dd =
  String(date.getDate())
  .padStart(2,'0');

  const mm =
  String(date.getMonth()+1)
  .padStart(2,'0');

  const yyyy =
  date.getFullYear();

  const hh =
  String(date.getHours())
  .padStart(2,'0');

  const min =
  String(date.getMinutes())
  .padStart(2,'0');

  return `${dd}/${mm}/${yyyy} ${hh}:${min}`;

}

/* ================= FORMAT NOPOL DEFAULT ================= */

const nopolInput =
document.getElementById(
'nopol'
);

nopolInput.placeholder =
'B 1234 ABC';

nopolInput.addEventListener(
'input',
()=>{

  let value =
  nopolInput.value
  .replace(/[^A-Z0-9]/gi,'')
  .toUpperCase();

  let depan = '';
  let angka = '';
  let belakang = '';

  for(let i=0;i<value.length;i++){

    const char = value[i];

    if(/[A-Z]/.test(char) && angka === ''){

      depan += char;

    }else if(/[0-9]/.test(char)){

      angka += char;

    }else if(/[A-Z]/.test(char) && angka !== ''){

      belakang += char;

    }

  }

  let hasil = depan;

  if(angka){

    hasil += ' ' + angka;

  }

  if(belakang){

    hasil += ' ' + belakang;

  }

  nopolInput.value =
  hasil.trim();

});

/* ================= INPUT JAM PROFESIONAL ================= */

const onUnload =
document.getElementById(
'onunloading'
);

const doneUnload =
document.getElementById(
'doneunloading'
);

onUnload.type =
'datetime-local';

doneUnload.type =
'datetime-local';

/* ================= FOTO PREVIEW ================= */

const fotoLaporan =
document.getElementById(
'fotoLaporan'
);

const previewFoto =
document.getElementById(
'previewFoto'
);

/* ================= POSISI INPUT FOTO ================= */

fotoLaporan.style.display='block';
fotoLaporan.style.margin='12px auto';
fotoLaporan.style.paddingLeft='18px';

/* ================= FOTO CHANGE ================= */

fotoLaporan.addEventListener(
'change',
function(){

  previewFoto.innerHTML='';

  fotoLaporanList=[];

  [...this.files].forEach(file=>{

    fotoLaporanList.push(file);

    const reader =
    new FileReader();

    reader.onload = e => {

      const img =
      document.createElement('img');

      img.src =
      e.target.result;

      img.style.width='90px';
      img.style.height='90px';
      img.style.objectFit='cover';
      img.style.borderRadius='14px';
      img.style.border='1px solid #2A313C';
      img.style.flexShrink='0';

      previewFoto.appendChild(img);

    };

    reader.readAsDataURL(file);

  });

});

/* ================= LOAD DATA ================= */

loadData();

async function loadData(){

  const {
    data,
    error
  } = await supabaseClient
  .from('phase_balance')
  .select('*')
  .order('id',{ascending:false});

  if(error){

    console.log(error);

    alert(
    'GAGAL LOAD DATA'
    );

    return;

  }

  semuaData = data || [];

  renderData();

}

/* ================= TAMBAH DATA ================= */

async function tambahData(){

  const driver =
  document.getElementById(
  'driver'
  ).value.trim();

  const nopol =
  document.getElementById(
  'nopol'
  ).value.trim();

  const phase =
  document.getElementById(
  'phase'
  ).value.trim();

  const jenis =
  document.getElementById(
  'jenis'
  ).value;

  const suratjalan =
  parseInt(
  document.getElementById(
  'suratjalan'
  ).value
  ) || 0;

  const onunloading =
  document.getElementById(
  'onunloading'
  ).value;

  const doneunloading =
  document.getElementById(
  'doneunloading'
  ).value;

  const kerja =
  parseInt(
  document.getElementById(
  'kerja'
  ).value
  ) || 0;

  const nolabel =
  parseInt(
  document.getElementById(
  'nolabel'
  ).value
  ) || 0;

  if(!driver){

    alert('INPUT DRIVER');
    return;

  }

  if(!phase){

    alert('INPUT PHASE');
    return;

  }

  const totalReal =
  kerja + nolabel;

  let status = '';
  let classStatus = '';

  if(totalReal === suratjalan){

    status = 'BALANCE';
    classStatus = 'balance';

  }else if(totalReal < suratjalan){

    status =
    `MINUS ${suratjalan - totalReal}`;

    classStatus = 'minus';

  }else{

    status =
    `PLUS ${totalReal - suratjalan}`;

    classStatus = 'plus';

  }

  const simpanData = {

    driver,
    nopol,
    phase,
    jenis,
    suratjalan,
    onunloading,
    doneunloading,
    kerja,
    nolabel,
    totalreal: totalReal,
    status,
    classstatus: classStatus

  };

  const {
    data,
    error
  } = await supabaseClient
  .from('phase_balance')
  .insert([simpanData])
  .select();

  if(error){

    console.log(error);

    alert(
    'GAGAL SIMPAN DATA'
    );

    return;

  }

  semuaData.unshift(
    data[0]
  );

  renderData();

  document.getElementById(
  'driver'
  ).value='';

  document.getElementById(
  'nopol'
  ).value='';

  document.getElementById(
  'phase'
  ).value='';

  document.getElementById(
  'jenis'
  ).selectedIndex=0;

  document.getElementById(
  'suratjalan'
  ).value='';

  document.getElementById(
  'onunloading'
  ).value='';

  document.getElementById(
  'doneunloading'
  ).value='';

  document.getElementById(
  'kerja'
  ).value='';

  document.getElementById(
  'nolabel'
  ).value='';

  alert(
  'DATA BERHASIL DITAMBAHKAN'
  );

}

/* ================= RESET ================= */

async function resetData(){

  const yakin =
  confirm(
  'YAKIN MAU HAPUS SEMUA DATA?'
  );

  if(!yakin) return;

  const {
    error
  } = await supabaseClient
  .from('phase_balance')
  .delete()
  .neq('id',0);

  if(error){

    console.log(error);

    alert(
    'GAGAL RESET DATA'
    );

    return;

  }

  semuaData = [];

  renderData();

}

/* ================= AUTO REPORT ================= */

function generateReport(){

  const hasilReport =
  document.getElementById(
  'hasilReport'
  );

  const hasilStaging =
  document.getElementById(
  'hasilStaging'
  );

  if(!semuaData.length){

    hasilReport.innerHTML =
    `
<div style="
text-align:center;
color:#8B949E;
font-weight:bold;
padding:20px;
">
BELUM ADA REPORT
</div>
`;

    hasilStaging.innerHTML =
    `
<div style="
text-align:center;
color:#8B949E;
font-weight:bold;
padding:20px;
">
BELUM ADA STAGING
</div>
`;

    return;

  }

  const now =
  new Date();

  const tanggal =
  now.toLocaleDateString(
  'id-ID'
  );

  const shift =
  document.getElementById(
  'shiftReport'
  ).value;

  let totalBag = 0;
  let totalNoLabel = 0;

  const uniqueUnit =
  [
    ...new Set(
      semuaData.map(
      item => item.nopol
      )
    )
  ];

  /* ================= DAILY REPORT ================= */

  let report =

`REPORT DAILY SHIFT LIQUIDATION

SEPATAN

${tanggal} ${shift}

━━━━━━━━━━━━━━

INBOUND:

`;

  semuaData.forEach((item,index)=>{

    report +=

`${index + 1}. PHASE ${item.phase} ${item.jenis}

DRIVER : ${item.driver}
NOPOL : ${item.nopol}

SURAT JALAN : ${item.suratjalan} BAG
HASIL INPUT MANUAL : ${item.kerja} BAG
BAG NO LABEL : ${item.nolabel} BAG

TOTAL REAL : ${item.totalreal} BAG
STATUS : ${item.status}

━━━━━━━━━━━━━━

`;

    totalBag +=
    Number(item.kerja);

    totalNoLabel +=
    Number(item.nolabel);

  });

  report +=

`INBOUND UNIT : ${uniqueUnit.length}
TOTAL BAG INBOUND : ${totalBag} BAG
TOTAL NO LABEL : ${totalNoLabel} BAG`;

  hasilReport.innerText =
  report;

  /* ================= STAGING UNIQUE ================= */

  let stagingUnik = [];

  semuaData.forEach(item=>{

    const namaPhase =
    `PROSES INBOUND DAN STAGING PHASE ${item.phase} ${item.jenis}`;

    if(
      !stagingUnik.includes(
      namaPhase
      )
    ){

      stagingUnik.push(
      namaPhase
      );

    }

  });

  let stagingText = '';

  stagingUnik.forEach((item)=>{

    stagingText +=
`${item}

`;

  });

  hasilStaging.innerText =
  stagingText.trim();

}

/* ================= SHIFT ================= */

document.getElementById(
'shiftReport'
).addEventListener(
'change',
generateReport
);

/* ================= KIRIM DAILY REPORT ================= */

async function kirimDailyReport(){

  generateReport();

  const hasilReport =
  document.getElementById(
  'hasilReport'
  ).innerText;

  if(
    fotoLaporanList.length > 0 &&
    navigator.share
  ){

    try{

      await navigator.share({

        text:hasilReport,
        files:fotoLaporanList

      });

    }catch(err){

      console.log(err);
    }

  }else{

    const waReport =
    'https://wa.me/?text=' +
    encodeURIComponent(
    hasilReport
    );

    window.open(
    waReport,
    '_blank'
    );

  }

}

/* ================= KIRIM STAGING ================= */

function kirimStagingReport(){

  generateReport();

  const hasilStaging =
  document.getElementById(
  'hasilStaging'
  ).innerText;

  const waStaging =
  'https://wa.me/?text=' +
  encodeURIComponent(
  hasilStaging
  );

  window.open(
    waStaging,
    '_blank'
  );

}

/* ================= RENDER ================= */

function renderData(){

  let html='';

  let grandLabel = 0;
  let grandNoLabel = 0;

  semuaData.forEach((item,index) => {

    grandLabel +=
    Number(item.kerja);

    grandNoLabel +=
    Number(item.nolabel);

    html += `

<div class="item">

${index + 1}. PHASE ${item.phase} ${item.jenis}

DRIVER : ${item.driver}
NOPOL : ${item.nopol}

SURAT JALAN : ${item.suratjalan} BAG
HASIL INPUT MANUAL : ${item.kerja} BAG
BAG NO LABEL : ${item.nolabel} BAG

ON UNLOADING : ${formatTanggalJam(item.onunloading)}
DONE UNLOADING : ${formatTanggalJam(item.doneunloading)}

TOTAL REAL : ${item.totalreal} BAG

<span class="${item.classstatus}">
STATUS : ${item.status}
</span>

</div>

`;

  });

  document.getElementById(
  'listData'
  ).innerHTML = html;

  document.getElementById(
  'grandTotal'
  ).innerHTML =

`TOTAL BAG LABEL :
<span class="total-number">
${grandLabel}
</span> BAG
<br>
