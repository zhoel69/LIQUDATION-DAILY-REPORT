<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>PHASE BALANCE SYSTEM</title>

<!-- CSS FILE -->
<link rel="stylesheet" href="styles.css">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">PHASE BALANCE SYSTEM</div>
    <div class="sub">SMART COUNT & CHECK</div>

    <div class="form-title">DATA SURAT JALAN</div>

    <div class="form-group">
      <label>NAMA DRIVER</label>
      <input type="text" class="input" id="driver" placeholder="INPUT DRIVER">
    </div>

    <div class="form-group">
      <label>NOMOR POLISI</label>
      <input type="text" class="input" id="nopol" placeholder="INPUT NOMOR POLISI">
    </div>

    <div class="grid2">
      <div class="form-group">
        <label>NO. PHASE</label>
        <input type="text" class="input" id="phase" placeholder="INPUT NO. PHASE">
      </div>

      <div class="form-group">
        <label>JENIS PHASE</label>
        <select class="input" id="jenis">
          <option>AWB</option>
          <option>NON AWB</option>
          <option>LIQUID</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>JUMLAH BAG SURAT JALAN</label>
      <input type="number" class="input" id="suratjalan" placeholder="INPUT JUMLAH BAG">
    </div>

    <div class="grid2">
      <div class="form-group">
        <label>ON UNLOADING</label>
        <input type="datetime-local" class="input" id="onunloading">
      </div>

      <div class="form-group">
        <label>DONE UNLOADING</label>
        <input type="datetime-local" class="input" id="doneunloading">
      </div>
    </div>

    <div class="form-title">DATA PENGERJAAN MANUAL</div>

    <div class="grid2">
      <div class="form-group">
        <label>HASIL KERJA</label>
        <input type="number" class="input" id="kerja">
      </div>

      <div class="form-group">
        <label>BAG NO LABEL</label>
        <input type="number" class="input" id="nolabel">
      </div>
    </div>

    <div class="form-group">
      <label>UPLOAD FOTO REPORT</label>
      <input type="file" class="input" id="fotoLaporan" multiple accept="image/*">
      <div id="previewFoto" class="preview-wrap"></div>
    </div>

    <div class="form-group">
      <label>PILIH SHIFT</label>
      <select class="input" id="shiftReport">
        <option>SHIFT 1</option>
        <option>SHIFT 2</option>
        <option>SHIFT 3</option>
      </select>
    </div>

    <button class="btn" onclick="tambahData()">TAMBAH DATA</button>
    <button class="reset-btn" onclick="resetData()">RESET SEMUA DATA</button>
    <button class="wa-btn" onclick="kirimDailyReport()">KIRIM DAILY REPORT</button>
    <button class="staging-btn" onclick="kirimStagingReport()">KIRIM STAGING</button>

    <div class="list-box">
      <div class="list-title">LIST HASIL PHASE</div>
      <div id="listData"></div>
    </div>

    <div class="list-box">
      <div class="list-title">GRAND TOTAL</div>
      <div id="grandTotal" class="phase-summary"></div>
    </div>

    <div class="list-box">
      <div class="list-title">DAILY REPORT</div>
      <div id="hasilReport" class="phase-summary"></div>
    </div>

    <div class="list-box">
      <div class="list-title">JOB DESC STAGING</div>
      <div id="hasilStaging" class="phase-summary"></div>
    </div>

    <div class="footer">
      PHASE BALANCE SYSTEM<br>
      DAILY LIQUIDATION & STAGING MONITORING<br><br>
      ©2026 ZULFAHMI AFNULA<br>
      ALL RIGHTS RESERVED
    </div>

  </div>
</div>

<!-- JS FILE -->
<script src="script.js"></script>

</body>
</html>
